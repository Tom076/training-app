<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Mi Rutina</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#14161a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rutina">
<style>
  :root {
    --bg: #14161a;
    --card: #1e2127;
    --card-border: #2c3038;
    --text: #eef0f3;
    --muted: #9aa1ac;
    --accent: #4f8cff;
    --good: #3ecf8e;
    --warn: #f0a63a;
    --danger: #ef5b5b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding-bottom: 100px;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 10px 12px 0;
    border-bottom: 1px solid var(--card-border);
  }
  .date-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .date {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: capitalize;
  }
  .settings-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 0 0 8px;
    line-height: 1;
  }
  .sync-status {
    font-size: 11px;
    color: var(--muted);
    margin: -4px 0 8px;
    min-height: 14px;
  }
  .sync-status.error { color: var(--danger); }
  .sync-status.ok { color: var(--good); }
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tab {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px 10px 0 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }
  .tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  /* Timer */
  .timer-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 10px 12px 12px;
    margin-bottom: 10px;
  }
  .timer-display {
    font-size: 42px;
    font-weight: 700;
    text-align: center;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
    transition: color 0.2s, transform 0.2s;
  }
  .timer-display.done {
    color: var(--good);
    animation: pulse 0.6s ease-in-out 3;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .timer-presets {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .preset-btn {
    background: #2a2e36;
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .preset-btn:active { background: var(--accent); }
  .timer-controls {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .timer-controls button {
    flex: 1;
    max-width: 110px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  #startPause { background: var(--good); color: #06281a; }
  #resetTimer { background: #2a2e36; color: var(--text); }

  main { padding: 12px; }
  .day-title {
    font-size: 18px;
    font-weight: 700;
    margin: 4px 0 12px;
  }
  .exercise-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .ex-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }
  .ex-name {
    font-weight: 600;
    font-size: 15px;
  }
  .badge {
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 20px;
    white-space: nowrap;
    font-weight: 600;
  }
  .badge.principal { background: rgba(79,140,255,0.15); color: var(--accent); }
  .badge.accesorio { background: rgba(240,166,58,0.15); color: var(--warn); }
  .badge.core { background: rgba(62,207,142,0.15); color: var(--good); }

  .ex-meta {
    display: flex;
    gap: 14px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .ex-meta b { color: var(--text); }

  .peso-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .peso-row label { font-size: 12px; color: var(--muted); }
  .peso-row input {
    flex: 1;
    background: #14161a;
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 14px;
  }

  .sets-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .set-check {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--card-border);
    background: #14161a;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .set-check.checked {
    background: var(--good);
    color: #06281a;
    border-color: var(--good);
  }
  .rest-btn {
    background: none;
    border: 1px solid var(--card-border);
    color: var(--muted);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .main-tabs {
    display: flex;
    gap: 6px;
    padding: 0 12px;
    margin-top: 12px;
  }
  .main-tab {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }
  .main-tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .view.hidden { display: none; }

  #chatMessages {
    padding: 12px;
    min-height: 40vh;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chat-empty {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    margin-top: 24px;
  }
  .chat-bubble {
    max-width: 80%;
    padding: 9px 12px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    white-space: pre-wrap;
  }
  .chat-bubble.user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .chat-bubble.assistant {
    align-self: flex-start;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-bottom-left-radius: 4px;
  }
  .chat-input-row {
    position: sticky;
    bottom: 64px;
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg);
    border-top: 1px solid var(--card-border);
  }
  .chat-input-row textarea {
    flex: 1;
    background: #14161a;
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 40px;
    max-height: 120px;
  }
  .chat-input-row button {
    background: var(--good);
    color: #06281a;
    border: none;
    border-radius: 10px;
    padding: 0 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .chat-hint {
    font-size: 11px;
    color: var(--muted);
    padding: 0 12px 8px;
    text-align: center;
  }

  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    border-top: 1px solid var(--card-border);
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  footer button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  #saveSession { background: var(--accent); color: white; }
  #copySummary { background: #2a2e36; color: var(--text); }
  #toggleHistory { background: #2a2e36; color: var(--text); flex: 0 0 auto; padding: 12px 14px; }

  #history {
    padding: 0 12px 12px;
  }
  #history.hidden { display: none; }
  .hist-entry {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .hist-entry .hist-date { font-weight: 700; margin-bottom: 6px; }
  .hist-entry .hist-ex { color: var(--muted); margin-bottom: 3px; }

  .toast {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--good);
    color: #06281a;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 20;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="date-row">
    <div class="date" id="todayDate"></div>
    <button class="settings-btn" id="settingsBtn" title="Configurar perfil y token de GitHub">⚙️</button>
  </div>
  <div class="sync-status" id="profileStatus"></div>
  <div class="sync-status" id="syncStatus"></div>
  <div class="tabs" id="dayTabs"></div>
  <div class="timer-box">
    <div class="timer-display" id="timerDisplay">01:30</div>
    <div class="timer-presets">
      <button class="preset-btn" data-secs="90">90s Principal</button>
      <button class="preset-btn" data-secs="60">60s Accesorio</button>
      <button class="preset-btn" data-secs="45">45s Core</button>
    </div>
    <div class="timer-controls">
      <button id="startPause">Iniciar</button>
      <button id="resetTimer">Reset</button>
    </div>
  </div>
</header>

<div class="main-tabs">
  <div class="main-tab active" data-view="rutina">Rutina</div>
  <div class="main-tab" data-view="chat">Chat</div>
</div>

<main id="exerciseList" class="view"></main>

<div id="chatView" class="view hidden">
  <div id="chatMessages"></div>
  <div class="chat-input-row">
    <textarea id="chatInput" placeholder="Escribí tu feedback o tu pregunta..."></textarea>
    <button id="chatSend">Enviar</button>
  </div>
  <div class="chat-hint">Cuando le pidas a Claude que revise el chat, tu mensaje aparece acá.</div>
</div>

<div id="history" class="hidden"></div>

<div class="toast" id="toast"></div>

<footer>
  <button id="saveSession">Guardar sesión</button>
  <button id="copySummary">Copiar resumen</button>
  <button id="toggleHistory">Historial</button>
</footer>

<script>
let ROUTINE = {};

const REST_SECONDS = { principal: 90, accesorio: 60, core: 45 };

// ---- GitHub-backed storage ----
const GH_OWNER = "Tom076";
const GH_REPO = "training-app";
const GH_API = "https://api.github.com";

function getToken() {
  return localStorage.getItem("gh_pat") || "";
}
function setToken(t) {
  localStorage.setItem("gh_pat", t.trim());
}

function getProfile() {
  return localStorage.getItem("profile_name") || "";
}
function setProfile(name) {
  localStorage.setItem("profile_name", name.trim());
}
function slugify(name) {
  return name.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "default";
}
function getProfileSlug() {
  const name = getProfile();
  return name ? slugify(name) : "default";
}
function statePath() {
  return `data/${getProfileSlug()}/state.json`;
}
function chatPath() {
  return `data/${getProfileSlug()}/chat.json`;
}
function routinePath() {
  return `data/${getProfileSlug()}/routine.json`;
}

function setProfileStatus() {
  const el = document.getElementById("profileStatus");
  if (!el) return;
  const name = getProfile();
  el.textContent = name ? `Perfil: ${name}` : "Sin perfil — tocá ⚙️ para configurar";
  el.className = "sync-status" + (name ? "" : " error");
}

function b64EncodeUnicode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function b64DecodeUnicode(str) {
  return decodeURIComponent(escape(atob(str.replace(/\n/g, ""))));
}

function setSyncStatus(msg, kind) {
  const el = document.getElementById("syncStatus");
  if (!el) return;
  el.textContent = msg;
  el.className = "sync-status" + (kind ? " " + kind : "");
}

async function ghGetFile(path) {
  const token = getToken();
  if (!token) throw new Error("no-token");
  const res = await fetch(`${GH_API}/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
    headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github+json" }
  });
  if (res.status === 404) return { data: null, sha: null };
  if (!res.ok) throw new Error("GitHub GET " + res.status);
  const json = await res.json();
  return { data: JSON.parse(b64DecodeUnicode(json.content)), sha: json.sha };
}

async function ghPutFile(path, data, sha, message) {
  const token = getToken();
  if (!token) throw new Error("no-token");
  const body = {
    message,
    content: b64EncodeUnicode(JSON.stringify(data, null, 2)),
    branch: "main"
  };
  if (sha) body.sha = sha;
  const res = await fetch(`${GH_API}/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
    method: "PUT",
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error("GitHub PUT " + res.status);
  const json = await res.json();
  return json.content.sha;
}

document.getElementById("settingsBtn").addEventListener("click", () => {
  const currentName = getProfile();
  const name = window.prompt(
    "Tu nombre (separa tu historial del de otras personas que usen la app):",
    currentName
  );
  if (name === null) return;
  if (name.trim()) setProfile(name);
  setProfileStatus();

  const current = getToken();
  const token = window.prompt(
    "Token de GitHub (dejalo vacío y aceptá para borrarlo):",
    current
  );
  if (token === null) return;
  if (token.trim() === "") {
    localStorage.removeItem("gh_pat");
    showToast("Token borrado");
  } else {
    setToken(token);
    showToast("Token guardado");
  }
  init();
});

let stateSha = null;
let chatSha = null;

async function loadState() {
  try {
    setSyncStatus("Sincronizando…");
    const { data, sha } = await ghGetFile(statePath());
    stateSha = sha;
    setSyncStatus("Sincronizado ✓", "ok");
    return data || {};
  } catch (e) {
    setSyncStatus(
      e.message === "no-token" ? "Sin token de GitHub configurado" : "Error al sincronizar",
      "error"
    );
    const cached = localStorage.getItem("state_cache_" + getProfileSlug());
    return cached ? JSON.parse(cached) : {};
  }
}

let saveTimeout = null;
function saveState(state) {
  localStorage.setItem("state_cache_" + getProfileSlug(), JSON.stringify(state));
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => persistState(state), 1000);
}

async function persistState(state) {
  try {
    setSyncStatus("Guardando…");
    stateSha = await ghPutFile(statePath(), state, stateSha, "Actualizar estado de entrenamiento");
    setSyncStatus("Guardado ✓", "ok");
  } catch (e) {
    try {
      const fresh = await ghGetFile(statePath());
      stateSha = await ghPutFile(statePath(), state, fresh.sha, "Actualizar estado de entrenamiento");
      setSyncStatus("Guardado ✓", "ok");
    } catch (e2) {
      setSyncStatus("No se pudo guardar en GitHub", "error");
    }
  }
}

async function loadRoutine() {
  try {
    const { data } = await ghGetFile(routinePath());
    if (data) localStorage.setItem("routine_cache_" + getProfileSlug(), JSON.stringify(data));
    return data || {};
  } catch (e) {
    const cached = localStorage.getItem("routine_cache_" + getProfileSlug());
    return cached ? JSON.parse(cached) : {};
  }
}

let state = { currentDay: 1, weights: {}, completed: {}, history: [] };

function parseSetsCount(seriesStr) {
  const match = seriesStr.match(/\d+/);
  return match ? parseInt(match[0], 10) : 3;
}

function getWeight(day, idx) {
  const saved = state.weights[day] && state.weights[day][idx];
  return saved !== undefined ? saved : ROUTINE[day].exercises[idx].pesoDefault;
}
function getCompleted(day, idx, count) {
  const saved = state.completed[day] && state.completed[day][idx];
  if (saved && saved.length === count) return saved;
  return new Array(count).fill(false);
}

function renderDate() {
  const d = new Date();
  document.getElementById("todayDate").textContent =
    d.toLocaleDateString("es-ES", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
}

function renderTabs() {
  const tabsEl = document.getElementById("dayTabs");
  tabsEl.innerHTML = "";
  Object.keys(ROUTINE).forEach(dayId => {
    const btn = document.createElement("div");
    btn.className = "tab" + (Number(dayId) === state.currentDay ? " active" : "");
    btn.textContent = "Día " + dayId;
    btn.onclick = () => {
      state.currentDay = Number(dayId);
      saveState(state);
      renderTabs();
      renderExercises();
    };
    tabsEl.appendChild(btn);
  });
}

function renderExercises() {
  const list = document.getElementById("exerciseList");
  const days = Object.keys(ROUTINE);
  if (days.length === 0) {
    list.innerHTML = `<div class="day-title">Sin rutina configurada</div>
      <p style="color: var(--muted); font-size: 14px;">
        Todavía no hay una rutina para el perfil "${getProfile() || getProfileSlug()}".
        Pedile a Claude que cree <code>${routinePath()}</code> en el repo, o tocá ⚙️ si esperabas ver otra cosa.
      </p>`;
    return;
  }
  const day = ROUTINE[state.currentDay] ? state.currentDay : Number(days[0]);
  state.currentDay = day;
  const data = ROUTINE[day];
  list.innerHTML = `<div class="day-title">Día ${day} — ${data.title}</div>`;

  data.exercises.forEach((ex, idx) => {
    const setsCount = parseSetsCount(ex.series);
    const completed = getCompleted(day, idx, setsCount);
    const weight = getWeight(day, idx);

    const card = document.createElement("div");
    card.className = "exercise-card";

    const setsHtml = completed.map((done, si) =>
      `<div class="set-check ${done ? "checked" : ""}" data-idx="${idx}" data-set="${si}">${si + 1}</div>`
    ).join("");

    card.innerHTML = `
      <div class="ex-head">
        <div class="ex-name">${ex.name}</div>
        <div class="badge ${ex.rest}">${ex.rest}</div>
      </div>
      <div class="ex-meta">
        <span>Series: <b>${ex.series}</b></span>
        <span>Reps: <b>${ex.reps}</b></span>
      </div>
      <div class="peso-row">
        <label>Peso</label>
        <input type="text" data-idx="${idx}" class="peso-input" value="${weight}">
      </div>
      <div class="sets-row">
        ${setsHtml}
        <button class="rest-btn" data-rest="${ex.rest}">⏱ Descanso (${REST_SECONDS[ex.rest]}s)</button>
      </div>
    `;
    list.appendChild(card);
  });

  // wire up events
  list.querySelectorAll(".peso-input").forEach(input => {
    input.addEventListener("change", e => {
      const idx = e.target.dataset.idx;
      state.weights[day] = state.weights[day] || {};
      state.weights[day][idx] = e.target.value;
      saveState(state);
    });
  });

  list.querySelectorAll(".set-check").forEach(box => {
    box.addEventListener("click", e => {
      const idx = e.target.dataset.idx;
      const si = Number(e.target.dataset.set);
      const setsCount = parseSetsCount(data.exercises[idx].series);
      const arr = getCompleted(day, idx, setsCount).slice();
      arr[si] = !arr[si];
      state.completed[day] = state.completed[day] || {};
      state.completed[day][idx] = arr;
      saveState(state);
      renderExercises();
    });
  });

  list.querySelectorAll(".rest-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      const rest = e.target.dataset.rest;
      setTimerSeconds(REST_SECONDS[rest]);
      startTimer();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

document.getElementById("saveSession").addEventListener("click", () => {
  const day = state.currentDay;
  const data = ROUTINE[day];
  if (!data) { showToast("No hay rutina configurada"); return; }
  const entries = data.exercises.map((ex, idx) => {
    const setsCount = parseSetsCount(ex.series);
    const completed = getCompleted(day, idx, setsCount);
    return {
      name: ex.name,
      peso: getWeight(day, idx),
      seriesCompletadas: completed.filter(Boolean).length + "/" + setsCount
    };
  });
  state.history.unshift({
    date: new Date().toISOString(),
    day: day,
    dayTitle: data.title,
    entries: entries
  });
  // reset per-session fields, keep weights
  state.completed[day] = {};
  saveState(state);
  renderExercises();
  renderHistory();
  showToast("Sesión guardada ✓");
});

document.getElementById("copySummary").addEventListener("click", async () => {
  const day = state.currentDay;
  const data = ROUTINE[day];
  if (!data) { showToast("No hay rutina configurada"); return; }
  let text = `Resumen — Día ${day}: ${data.title} (${new Date().toLocaleDateString("es-ES")})\n\n`;
  data.exercises.forEach((ex, idx) => {
    const setsCount = parseSetsCount(ex.series);
    const completed = getCompleted(day, idx, setsCount);
    const weight = getWeight(day, idx);
    text += `- ${ex.name}: ${weight} — series: ${completed.filter(Boolean).length}/${setsCount}\n`;
  });
  try {
    await navigator.clipboard.writeText(text);
    showToast("Resumen copiado ✓");
  } catch (e) {
    showToast("No se pudo copiar");
  }
});

document.getElementById("toggleHistory").addEventListener("click", () => {
  const hist = document.getElementById("history");
  hist.classList.toggle("hidden");
  if (!hist.classList.contains("hidden")) renderHistory();
});

function renderHistory() {
  const hist = document.getElementById("history");
  if (state.history.length === 0) {
    hist.innerHTML = `<div class="hist-entry">Todavía no hay sesiones guardadas.</div>`;
    return;
  }
  hist.innerHTML = state.history.map(session => {
    const d = new Date(session.date).toLocaleDateString("es-ES", { weekday: "short", day: "numeric", month: "short" });
    const exLines = session.entries.map(e =>
      `<div class="hist-ex">${e.name}: ${e.peso} — ${e.seriesCompletadas}</div>`
    ).join("");
    return `<div class="hist-entry"><div class="hist-date">${d} — Día ${session.day}: ${session.dayTitle}</div>${exLines}</div>`;
  }).join("");
}

// ---- Timer ----
let timerSeconds = 90;
let timerRemaining = 90;
let timerInterval = null;
let timerRunning = false;

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}

function updateTimerDisplay() {
  document.getElementById("timerDisplay").textContent = formatTime(timerRemaining);
}

function setTimerSeconds(s) {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = s;
  timerRemaining = s;
  document.getElementById("startPause").textContent = "Iniciar";
  document.getElementById("timerDisplay").classList.remove("done");
  updateTimerDisplay();
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.25, 0.5].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = 880;
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.2, ctx.currentTime + delay);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.15);
    });
  } catch (e) {}
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  document.getElementById("startPause").textContent = "Pausar";
  document.getElementById("timerDisplay").classList.remove("done");
  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById("startPause").textContent = "Iniciar";
      document.getElementById("timerDisplay").classList.add("done");
      playBeep();
      setTimeout(() => setTimerSeconds(timerSeconds), 2000);
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById("startPause").textContent = "Iniciar";
}

document.getElementById("startPause").addEventListener("click", () => {
  if (timerRunning) pauseTimer();
  else startTimer();
});
document.getElementById("resetTimer").addEventListener("click", () => setTimerSeconds(timerSeconds));
document.querySelectorAll(".preset-btn").forEach(btn => {
  btn.addEventListener("click", () => setTimerSeconds(Number(btn.dataset.secs)));
});

// ---- Main view tabs (Rutina / Chat) ----
let chatPollInterval = null;

document.querySelectorAll(".main-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".main-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const view = tab.dataset.view;
    document.getElementById("exerciseList").classList.toggle("hidden", view !== "rutina");
    document.getElementById("chatView").classList.toggle("hidden", view !== "chat");
    if (view === "chat") {
      fetchChat();
      if (!chatPollInterval) chatPollInterval = setInterval(fetchChat, 8000);
    } else if (chatPollInterval) {
      clearInterval(chatPollInterval);
      chatPollInterval = null;
    }
  });
});

// ---- Chat ----
async function fetchChat() {
  try {
    const { data, sha } = await ghGetFile(chatPath());
    chatSha = sha;
    renderChatMessages(data || []);
  } catch (e) {}
}

function renderChatMessages(messages) {
  const box = document.getElementById("chatMessages");
  const wasAtBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 20;
  if (messages.length === 0) {
    box.innerHTML = `<div class="chat-empty">Todavía no hay mensajes. Escribí algo abajo.</div>`;
    return;
  }
  box.innerHTML = messages.map(m =>
    `<div class="chat-bubble ${m.role}">${escapeHtml(m.text)}</div>`
  ).join("");
  if (wasAtBottom) box.scrollTop = box.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

async function sendChatMessage() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  try {
    // Refetch latest first so we don't clobber messages Claude just pushed.
    const { data, sha } = await ghGetFile(chatPath());
    const messages = data || [];
    messages.push({
      id: (messages.reduce((m, x) => Math.max(m, x.id || 0), 0)) + 1,
      role: "user",
      text,
      ts: new Date().toISOString()
    });
    chatSha = await ghPutFile(chatPath(), messages, sha, "Nuevo mensaje de feedback");
    renderChatMessages(messages);
  } catch (e) {
    showToast("No se pudo enviar (¿configuraste el token en ⚙️?)");
  }
}

document.getElementById("chatSend").addEventListener("click", sendChatMessage);
document.getElementById("chatInput").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
});

// ---- Init ----
async function init() {
  setProfileStatus();
  if (!getToken()) setSyncStatus("Sin token — tocá ⚙️ para configurar", "error");
  stateSha = null;
  chatSha = null;
  state = { currentDay: 1, weights: {}, completed: {}, history: [] };
  ROUTINE = await loadRoutine();
  const loaded = await loadState();
  Object.assign(state, loaded);
  renderDate();
  renderTabs();
  renderExercises();
  setTimerSeconds(90);
}
init();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
